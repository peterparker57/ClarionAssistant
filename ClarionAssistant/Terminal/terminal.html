<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #terminal-container {
            width: 100%;
            flex: 1;
            min-height: 0;
        }
        /* Hide scrollbar in xterm viewport for cleaner look - scrolling still works */
        .xterm-viewport::-webkit-scrollbar {
            width: 10px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
        body.light .xterm-viewport::-webkit-scrollbar-thumb {
            background: #bbb;
        }
        body.light .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* Status line bar */
        #status-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 4px 10px;
            background: #181825;
            border-bottom: 1px solid #313244;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            flex-shrink: 0;
            overflow: hidden;
            white-space: nowrap;
        }
        #status-bar.visible { display: flex; }
        .sl-model {
            background: #40a02b;
            color: #1e1e2e;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 12px;
        }
        .sl-peak {
            background: #313244;
            color: #a6adc8;
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 12px;
        }
        .sl-peak.off-peak { color: #a6e3a1; }
        .sl-quota { color: #7f849c; font-size: 12px; }
        .sl-quota .used { color: #cdd6f4; }
        .sl-quota .pace { color: #a6e3a1; }
        .sl-quota .pace.warn { color: #fab387; }
        .sl-quota .pace.danger { color: #f38ba8; }
        .sl-context {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #7f849c;
            font-size: 12px;
            margin-left: auto;
        }
        .sl-bar {
            width: 70px;
            height: 7px;
            background: #313244;
            border-radius: 3px;
            overflow: hidden;
        }
        .sl-fill {
            height: 100%;
            background: #a6e3a1;
            border-radius: 3px;
            transition: width 0.5s;
        }
        .sl-fill.warn { background: #fab387; }
        .sl-fill.danger { background: #f38ba8; }

        /* Light theme status line */
        body.light #status-bar { background: #e6e9ef; border-bottom-color: #ccd0da; }
        body.light .sl-model { background: #40a02b; color: #fff; }
        body.light .sl-peak { background: #dce0e8; color: #6c6f85; }
        body.light .sl-peak.off-peak { color: #40a02b; }
        body.light .sl-quota { color: #8c8fa1; }
        body.light .sl-quota .used { color: #4c4f69; }
        body.light .sl-quota .pace { color: #40a02b; }
        body.light .sl-quota .pace.warn { color: #fe640b; }
        body.light .sl-quota .pace.danger { color: #d20f39; }
        body.light .sl-context { color: #8c8fa1; }
        body.light .sl-bar { background: #ccd0da; }
        body.light .sl-fill { background: #40a02b; }
        body.light .sl-fill.warn { background: #fe640b; }
        body.light .sl-fill.danger { background: #d20f39; }
    </style>
</head>
<body>
    <div id="status-bar"></div>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.min.js"
            onerror="console.warn('Canvas addon unavailable — block characters may render imperfectly with non-Cascadia fonts')"></script>

    <script>
        // Theme definitions matching TerminalTheme.cs
        const themes = {
            dark: {
                background: '#0C0C0C',
                foreground: '#CCCCCC',
                cursor: '#FFFFFF',
                cursorAccent: '#000000',
                selectionBackground: '#264F78',
                selectionForeground: '#FFFFFF',
                black: '#0C0C0C',
                red: '#C50F1F',
                green: '#13A10E',
                yellow: '#C19C00',
                blue: '#0037DA',
                magenta: '#881798',
                cyan: '#3A96DD',
                white: '#CCCCCC',
                brightBlack: '#767676',
                brightRed: '#E74856',
                brightGreen: '#16C60C',
                brightYellow: '#F9F1A5',
                brightBlue: '#3B78FF',
                brightMagenta: '#B4009E',
                brightCyan: '#61D6D6',
                brightWhite: '#F2F2F2'
            },
            light: {
                background: '#FFFFFF',
                foreground: '#1a5fb4',
                cursor: '#1e66f5',
                cursorAccent: '#FFFFFF',
                selectionBackground: '#ADD6FF',
                selectionForeground: '#000000',
                black: '#1a3a5c',
                red: '#C50F1F',
                green: '#13A10E',
                yellow: '#9d7d00',
                blue: '#0037DA',
                magenta: '#881798',
                cyan: '#0e7a8a',
                white: '#5c5c5c',
                brightBlack: '#767676',
                brightRed: '#E74856',
                brightGreen: '#16C60C',
                brightYellow: '#c19c00',
                brightBlue: '#3B78FF',
                brightMagenta: '#B4009E',
                brightCyan: '#3A96DD',
                brightWhite: '#4c4c4c'
            }
        };

        let term = null;
        let fitAddon = null;
        let currentFontSize = 10;
        let currentThemeName = 'dark';
        let isInitialized = false;

        // Remap ANSI colors for light mode readability.
        // Claude Code hardcodes dark-theme RGB values that are unreadable on white.
        function remapForLightMode(text) {
            // Helper: darken an RGB foreground that's too light for white background
            function darkenFg(r, g, b) {
                var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                if (lum > 0.55) {
                    var factor = Math.max(0.25, 0.55 / lum);
                    return Math.round(r * factor) + ';' + Math.round(g * factor) + ';' + Math.round(b * factor);
                }
                return null;
            }

            // 1) Standard ANSI bg colors (41-47, 101-107) → light pastel 24-bit equivalents
            var lightBg = {
                '41': '48;2;254;215;220', '42': '48;2;210;240;208',
                '43': '48;2;252;245;200', '44': '48;2;200;220;254',
                '45': '48;2;240;215;240', '46': '48;2;210;242;242',
                '101': '48;2;254;225;230', '102': '48;2;220;245;218',
                '103': '48;2;253;248;210', '104': '48;2;210;228;254',
                '105': '48;2;245;225;245', '106': '48;2;220;248;248'
            };
            text = text.replace(/\x1b\[((?:4[1-7]|10[1-7]))m/g, function(match, code) {
                return lightBg[code] ? '\x1b[' + lightBg[code] + 'm' : match;
            });

            // 2) Dark 24-bit backgrounds → light pastel blue
            text = text.replace(/\x1b\[48;2;(\d+);(\d+);(\d+)m/g, function(match, r, g, b) {
                r = parseInt(r); g = parseInt(g); b = parseInt(b);
                if (r < 70 && g < 70 && b < 70) {
                    return '\x1b[48;2;220;232;254m'; // light blue #DCE8FE
                }
                return match;
            });

            // 3) 24-bit foregrounds → darken light colors for white background
            //    Also handles combined SGR sequences (e.g. \x1b[0;38;2;R;G;Bm)
            text = text.replace(/\x1b\[([0-9;]*)38;2;(\d+);(\d+);(\d+)((?:;[0-9]*)*)m/g, function(match, pre, r, g, b, post) {
                r = parseInt(r); g = parseInt(g); b = parseInt(b);
                var dark = darkenFg(r, g, b);
                if (dark) {
                    return '\x1b[' + (pre || '') + '38;2;' + dark + (post || '') + 'm';
                }
                return match;
            });

            // 4) 256-color foregrounds → convert light colors to darker equivalents
            text = text.replace(/\x1b\[([0-9;]*)38;5;(\d+)((?:;[0-9]*)*)m/g, function(match, pre, n, post) {
                n = parseInt(n);
                var r, g, b;
                if (n >= 232) {
                    // Grayscale ramp: 232=rgb(8,8,8) .. 255=rgb(238,238,238)
                    var gray = 8 + (n - 232) * 10;
                    r = g = b = gray;
                } else if (n >= 16) {
                    // 6x6x6 color cube
                    var idx = n - 16;
                    b = (idx % 6) * 51; idx = Math.floor(idx / 6);
                    g = (idx % 6) * 51;
                    r = Math.floor(idx / 6) * 51;
                } else {
                    return match; // standard 0-15 handled by xterm theme
                }
                var dark = darkenFg(r, g, b);
                if (dark) {
                    return '\x1b[' + (pre || '') + '38;2;' + dark + (post || '') + 'm';
                }
                return match;
            });

            return text;
        }

        // Initialize terminal
        function initTerminal(themeName = 'dark') {
            currentThemeName = themeName;
            const container = document.getElementById('terminal-container');

            term = new Terminal({
                cursorBlink: false,
                cursorStyle: 'block',
                fontFamily: '"Cascadia Mono", Consolas, "Courier New", monospace',
                fontSize: currentFontSize,
                theme: themes[themeName] || themes.dark,
                customGlyphs: true,
                allowProposedApi: true,
                scrollback: 10000,
                convertEol: false,
                letterSpacing: -1,
                lineHeight: 1
            });

            // Load addons
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);

            // Open terminal in container
            term.open(container);

            // Load canvas renderer for customGlyphs support — draws block/box
            // characters as pixel-perfect rectangles independent of font choice
            if (typeof CanvasAddon !== 'undefined') {
                try {
                    term.loadAddon(new CanvasAddon.CanvasAddon());
                } catch (e) {
                    console.warn('Canvas addon failed:', e);
                }
            }

            // Handle OSC 10/11 queries — lets CLI tools (Claude Code) detect terminal fg/bg colors
            function oscColorResponse(code, hexColor) {
                const r = parseInt(hexColor.substr(1,2), 16);
                const g = parseInt(hexColor.substr(3,2), 16);
                const b = parseInt(hexColor.substr(5,2), 16);
                const hex4 = (v) => (v * 257).toString(16).padStart(4, '0');
                const resp = '\x1b]' + code + ';rgb:' + hex4(r) + '/' + hex4(g) + '/' + hex4(b) + '\x1b\\';
                const encoder = new TextEncoder();
                const bytes = encoder.encode(resp);
                sendToHost({ type: 'input', data: btoa(String.fromCharCode(...bytes)) });
            }
            // OSC 10: foreground color query
            term.parser.registerOscHandler(10, (data) => {
                if (data === '?') {
                    oscColorResponse(10, (term.options.theme && term.options.theme.foreground) || '#ffffff');
                }
                return true;
            });
            // OSC 11: background color query
            term.parser.registerOscHandler(11, (data) => {
                if (data === '?') {
                    oscColorResponse(11, (term.options.theme && term.options.theme.background) || '#000000');
                }
                return true;
            });

            // Initial fit — use ResizeObserver to handle WebView2 layout race condition.
            // DOMContentLoaded fires before WinForms finishes sizing the WebView2 control,
            // so the container may have zero/incorrect dimensions at this point. (#19)
            const ro = new ResizeObserver(entries => {
                for (const entry of entries) {
                    if (entry.contentRect.height > 0 && fitAddon) {
                        fitAddon.fit();
                    }
                }
            });
            ro.observe(container);
            fitAddon.fit(); // also try immediately in case container is already sized

            // Custom key handler for Windows-style shortcuts
            term.attachCustomKeyEventHandler((event) => {
                // CTRL+C: Copy if text selected, otherwise let it pass as interrupt
                if (event.ctrlKey && event.key === 'c' && event.type === 'keydown') {
                    const selection = term.getSelection();
                    if (selection && selection.length > 0) {
                        navigator.clipboard.writeText(selection);
                        return false; // Prevent default (don't send to terminal)
                    }
                    // No selection - let CTRL+C pass through as interrupt
                    return true;
                }

                // CTRL+V: Request paste from C# (avoids clipboard permission prompts)
                if (event.ctrlKey && event.key === 'v' && event.type === 'keydown') {
                    event.preventDefault();
                    event.stopPropagation();
                    sendToHost({ type: 'paste' });
                    return false; // Prevent xterm.js from processing
                }

                // CTRL+Enter: Send LF (newline) instead of CR (carriage return)
                if (event.ctrlKey && event.key === 'Enter' && event.type === 'keydown') {
                    sendToHost({ type: 'input', data: btoa('\n') });
                    return false; // Prevent default Enter behavior
                }

                // Let all other keys pass through normally
                return true;
            });

            // Handle user input - send to C#
            // Use TextEncoder to properly encode multi-byte (UTF-8) characters before Base64
            term.onData((data) => {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(data);
                const binary = String.fromCharCode(...bytes);
                sendToHost({ type: 'input', data: btoa(binary) });
            });

            // Handle resize - notify C#
            term.onResize((size) => {
                sendToHost({ type: 'resize', cols: size.cols, rows: size.rows });
            });

            // Handle title changes
            term.onTitleChange((title) => {
                sendToHost({ type: 'title', title: title });
            });

            // Handle window resize with debounce to reduce flashing
            let resizeTimeout = null;
            window.addEventListener('resize', () => {
                if (resizeTimeout) {
                    clearTimeout(resizeTimeout);
                }
                resizeTimeout = setTimeout(() => {
                    if (fitAddon) {
                        fitAddon.fit();
                    }
                    resizeTimeout = null;
                }, 50);
            });

            // Handle Ctrl+mousewheel for font size
            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -1 : 1;
                    const newSize = Math.max(6, Math.min(32, currentFontSize + delta));
                    if (newSize !== currentFontSize) {
                        setFontSize(newSize);
                        // Notify C# of font size change so it can be saved
                        sendToHost({ type: 'fontSizeChanged', fontSize: newSize });
                    }
                }
            }, { passive: false });

            // Handle right-click for context menu
            container.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const selectedText = (term && term.hasSelection()) ? term.getSelection() : '';
                sendToHost({
                    type: 'contextmenu',
                    x: e.clientX,
                    y: e.clientY,
                    selectedText: selectedText
                });
            });

            // Notify C# when terminal is clicked (for dropdown close)
            container.addEventListener('mousedown', () => {
                sendToHost({ type: 'terminalclick' });
            });

            isInitialized = true;

            // Notify C# that terminal is ready
            sendToHost({ type: 'ready', cols: term.cols, rows: term.rows });
        }

        // Send message to C# host
        function sendToHost(message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(message);
            }
        }

        // Handle messages from C#
        function handleHostMessage(message) {
            if (!term) return;

            if (typeof message === 'string') {
                // Simple string protocol: "command:data"
                const colonIndex = message.indexOf(':');
                if (colonIndex > 0) {
                    const command = message.substring(0, colonIndex);
                    const data = message.substring(colonIndex + 1);

                    switch (command) {
                        case 'data':
                            // Base64 encoded terminal data - decode as UTF-8
                            // Note: Must mask with 0xFF to handle multi-byte UTF-8 chars (emojis)
                            const binaryString = atob(data);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i) & 0xFF;
                            }
                            let text = new TextDecoder('utf-8').decode(bytes);
                            if (currentThemeName === 'light') {
                                text = remapForLightMode(text);
                            }
                            term.write(text);
                            break;

                        case 'theme':
                            setTheme(data);
                            break;

                        case 'fontSize':
                            setFontSize(parseFloat(data));
                            break;

                        case 'fontFamily':
                            setFontFamily(data);
                            break;

                        case 'clear':
                            term.clear();
                            break;

                        case 'reset':
                            term.reset();
                            break;

                        case 'focus':
                            term.focus();
                            break;

                        case 'scrollToBottom':
                            term.scrollToBottom();
                            break;

                        case 'typeInput':
                            // Character-by-character injection — mimics real keyboard typing.
                            // Used by NudgeTerminal to inject [cm] trigger into Claude Code.
                            // Format: "typeInput:delayMs:base64data"
                            // Each character is sent individually through the xterm input path
                            // with a configurable delay between keystrokes.
                            {
                                let charDelay = 15;
                                let charData = data;
                                const delayMatch = data.match(/^(\d+):(.+)$/);
                                if (delayMatch) {
                                    charDelay = parseInt(delayMatch[1], 10);
                                    charData = delayMatch[2];
                                }
                                const decoded = atob(charData);
                                let charIndex = 0;
                                const typeNextChar = () => {
                                    if (charIndex < decoded.length) {
                                        sendToHost({ type: 'input', data: btoa(decoded[charIndex]) });
                                        charIndex++;
                                        setTimeout(typeNextChar, charDelay);
                                    }
                                };
                                typeNextChar();
                            }
                            break;

                        case 'statusLine':
                            renderStatusLine(JSON.parse(data));
                            break;

                        case 'sendEnter':
                            // Simulate Enter key by sending CR through the input path
                            // This goes through the same channel as physical keypresses

                            // Capture cursor position BEFORE sending Enter
                            const cursorYBefore = term.buffer.active.cursorY;
                            const cursorXBefore = term.buffer.active.cursorX;

                            sendToHost({ type: 'input', data: btoa('\r') });

                            // Poll for cursor movement to verify Enter was processed
                            // If cursor moves to a new line, the prompt was submitted
                            const startTime = Date.now();
                            const maxWaitMs = 500; // Wait up to 500ms for cursor movement

                            const checkCursorMoved = () => {
                                const cursorYAfter = term.buffer.active.cursorY;
                                const cursorXAfter = term.buffer.active.cursorX;
                                const elapsed = Date.now() - startTime;

                                // Success: Cursor moved to a new line OR went back to column 0
                                // (indicates prompt was submitted and new prompt started)
                                if (cursorYAfter !== cursorYBefore || cursorXAfter < cursorXBefore) {
                                    sendToHost({ type: 'enterAck' });
                                    return;
                                }

                                // Timeout: Enter wasn't processed
                                if (elapsed >= maxWaitMs) {
                                    console.warn(`[Terminal] Enter key timeout after ${elapsed}ms - cursor didn't move (Y: ${cursorYBefore} -> ${cursorYAfter}, X: ${cursorXBefore} -> ${cursorXAfter})`);
                                    sendToHost({ type: 'enterAck' }); // Still ack to prevent hang
                                    return;
                                }

                                // Keep polling every 10ms
                                setTimeout(checkCursorMoved, 10);
                            };

                            // Start polling after brief delay to let terminal process
                            setTimeout(checkCursorMoved, 20);
                            break;
                    }
                }
            }
        }

        // Set theme
        function setTheme(themeName) {
            currentThemeName = themeName;
            const theme = themes[themeName] || themes.dark;
            if (term) {
                term.options.theme = theme;
                document.body.style.backgroundColor = theme.background;
            }
            if (themeName === 'light') {
                document.body.classList.add('light');
            } else {
                document.body.classList.remove('light');
            }
            try { localStorage.setItem('terminalTheme', themeName); } catch(e) {}
        }

        // Set font size
        function setFontSize(size) {
            size = Math.max(6, Math.min(32, size));
            currentFontSize = size;
            if (term) {
                term.options.fontSize = size;
                if (fitAddon) {
                    fitAddon.fit();
                }
            }
        }

        // Set font family
        function setFontFamily(family) {
            if (term && family) {
                term.options.fontFamily = '"' + family + '", Consolas, "Courier New", monospace';
                if (fitAddon) {
                    fitAddon.fit();
                }
            }
        }

        // Get selected text from terminal (exposed to C# via window object)
        function getSelectedText() {
            return (term && term.hasSelection()) ? term.getSelection() : '';
        }
        window.terminalGetSelection = getSelectedText;

        function escHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

        function renderStatusLine(d) {
            var el = document.getElementById('status-bar');
            if (!d || !d.model) { el.classList.remove('visible'); return; }
            var h = '';
            h += '<span class="sl-model">' + escHtml(d.model) + '</span>';
            h += '<span class="sl-peak' + (d.isOffPeak ? ' off-peak' : '') + '">' + (d.isOffPeak ? 'Off-peak' : 'Peak') + '</span>';
            if (d.quota5h !== null && d.quota5h !== undefined) {
                var p5 = 'pace'; if (d.pace5h < 0) p5 += ' warn'; if (d.quota5h > 80) p5 += ' danger';
                h += '<span class="sl-quota">5h <span class="used">' + d.quota5h + '%</span>';
                if (d.pace5h !== null && d.pace5h !== undefined) h += ' <span class="' + p5 + '">' + (d.pace5h >= 0 ? '+' : '') + d.pace5h + '%</span>';
                h += '</span>';
            }
            if (d.quota7d !== null && d.quota7d !== undefined) {
                var p7 = 'pace'; if (d.pace7d < 0) p7 += ' warn'; if (d.quota7d > 80) p7 += ' danger';
                h += '<span class="sl-quota">7d <span class="used">' + d.quota7d + '%</span>';
                if (d.pace7d !== null && d.pace7d !== undefined) h += ' <span class="' + p7 + '">' + (d.pace7d >= 0 ? '+' : '') + d.pace7d + '%</span>';
                h += '</span>';
            }
            if (d.contextPct !== null && d.contextPct !== undefined) {
                var pct = Math.round(d.contextPct);
                var fc = 'sl-fill'; if (pct > 70) fc += ' warn'; if (pct > 90) fc += ' danger';
                h += '<span class="sl-context">Context: <span class="sl-bar"><span class="' + fc + '" style="width:' + pct + '%"></span></span> ' + pct + '%</span>';
            }
            el.innerHTML = h;
            var wasVisible = el.classList.contains('visible');
            el.classList.add('visible');
            if (!wasVisible && fitAddon) setTimeout(function() { fitAddon.fit(); }, 50);
        }

        // Listen for messages from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (event) => {
                handleHostMessage(event.data);
            });
        }

        // Use saved theme to avoid flash on load
        var savedTheme = 'dark';
        try { savedTheme = localStorage.getItem('terminalTheme') || 'dark'; } catch(e) {}

        // Set body background immediately to prevent white flash
        document.body.style.backgroundColor = (themes[savedTheme] || themes.dark).background;
        if (savedTheme === 'light') document.body.classList.add('light');

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initTerminal(savedTheme);
        });

        // Also handle case where DOM is already loaded
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(() => {
                if (!isInitialized) {
                    initTerminal(savedTheme);
                }
            }, 0);
        }
    </script>
</body>
</html>
